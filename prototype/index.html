<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irresistible Proposal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating hearts background -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main card -->
  <div class="card" id="card">
    <div class="card-content" id="cardContent">
      <h1 class="title" id="title">So... will you get me a Switch 2 for Pokopia? 🎮</h1>
      <p class="subtitle" id="subtitle">Choose carefully, okay?</p>
      <div class="buttons" id="buttons">
        <button class="btn btn-yes" id="btnYes">YES</button>
        <button class="btn btn-no" id="btnNo">NO</button>
      </div>
      <!-- Extra containers for level mechanics -->
      <div class="level-extra" id="levelExtra"></div>
    </div>
  </div>

  <!-- Celebration overlay -->
  <div class="celebration-overlay" id="celebrationOverlay">
    <div class="celebration-content">
      <h1 class="celebration-title" id="celebrationTitle">I knew you'd say yes 🎉</h1>
      <p class="celebration-sub">Switch 2 + Pokopia = the happiest me 🎮❤️</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
